<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#105c46">
    <meta name="description" content="Agenda mobile dos jogos do dia e onde assistir.">
    <title>Jogos de hoje</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/app.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Agenda do futebol</p>
          <h1>Jogos de hoje</h1>
        </div>
        <div class="connection-pill" id="connection-status" aria-live="polite">Online</div>
      </header>

      <main class="content">
        <section class="scoreboard" aria-labelledby="summary-title">
          <div>
            <p class="eyebrow">Partidas filtradas</p>
            <h2 id="summary-title">0 jogos</h2>
          </div>
          <div class="summary-grid" aria-label="Resumo dos jogos">
            <div>
              <span id="summary-live">0</span>
              <small>ao vivo</small>
            </div>
            <div>
              <span id="summary-tv">0</span>
              <small>com transmissão</small>
            </div>
          </div>
        </section>

        <section class="filters" aria-label="Filtros dos jogos">
          <div class="filter-row">
            <div class="field date-field" id="date-picker">
              <span id="date-filter-label">Data</span>
              <div class="date-control" aria-labelledby="date-filter-label">
                <button class="date-step" id="date-prev" type="button" aria-label="Dia anterior" title="Dia anterior">
                  <span aria-hidden="true">‹</span>
                </button>
                <button
                  class="date-display"
                  id="date-display"
                  type="button"
                  aria-haspopup="dialog"
                  aria-expanded="false"
                  aria-labelledby="date-filter-label date-display-date"
                >
                  <span class="date-display__day" id="date-display-day">Hoje</span>
                  <strong id="date-display-date">--/--/----</strong>
                </button>
                <button class="date-step" id="date-next" type="button" aria-label="Próximo dia" title="Próximo dia">
                  <span aria-hidden="true">›</span>
                </button>
              </div>

              <div class="date-popover" id="date-popover" role="dialog" aria-label="Escolher data" hidden>
                <div class="calendar-header">
                  <button id="calendar-prev-month" type="button" aria-label="Mês anterior">
                    <span aria-hidden="true">‹</span>
                  </button>
                  <strong id="calendar-month-label">--</strong>
                  <button id="calendar-next-month" type="button" aria-label="Próximo mês">
                    <span aria-hidden="true">›</span>
                  </button>
                </div>
                <div class="calendar-weekdays" aria-hidden="true">
                  <span>Dom</span>
                  <span>Seg</span>
                  <span>Ter</span>
                  <span>Qua</span>
                  <span>Qui</span>
                  <span>Sex</span>
                  <span>Sáb</span>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
                <button class="today-button" id="date-today" type="button">Hoje</button>
              </div>
            </div>

            <label class="field">
              <span>Busca</span>
              <input id="search-filter" type="search" placeholder="Time, estádio ou canal">
            </label>
          </div>

          <div class="competition-field">
            <span class="filter-title">Campeonatos</span>
            <div class="competition-tabs" id="competition-filter" role="tablist" aria-label="Campeonatos"></div>
          </div>
        </section>

        <section class="list-header" aria-live="polite">
          <div>
            <p class="eyebrow">Atualizado em</p>
            <strong id="updated-at">--</strong>
            <div class="source-row">
              <span class="source-pill" id="source-label">--</span>
              <span class="auto-refresh-status" id="auto-refresh-status">Auto: --</span>
              <label class="notification-toggle" id="goal-notification-control">
                <input
                  id="goal-notifications-toggle"
                  type="checkbox"
                  role="switch"
                  aria-describedby="goal-notification-status"
                  aria-label="Notificacoes de gol"
                >
                <span class="notification-toggle__track" aria-hidden="true"></span>
                <span class="notification-toggle__text">Gols</span>
              </label>
              <span class="notification-status" id="goal-notification-status">Gols: desligado</span>
            </div>
          </div>
          <div class="list-actions">
            <button class="icon-button icon-button--whatsapp" id="whatsapp-button" type="button" aria-label="Enviar agenda pelo WhatsApp" title="Enviar agenda pelo WhatsApp">
              <span aria-hidden="true">WA</span>
            </button>
            <button class="icon-button" id="refresh-button" type="button" aria-label="Atualizar jogos" title="Atualizar jogos">
              <span aria-hidden="true">↻</span>
            </button>
          </div>
        </section>

        <section class="share-panel" id="whatsapp-panel" aria-labelledby="whatsapp-panel-title" hidden>
          <form class="share-form" id="whatsapp-form">
            <div class="share-heading">
              <p class="eyebrow">WhatsApp</p>
              <h2 id="whatsapp-panel-title">Enviar agenda</h2>
            </div>
            <label class="field share-phone-field">
              <span>Contato</span>
              <input
                id="whatsapp-phone"
                type="tel"
                inputmode="tel"
                autocomplete="tel"
                placeholder="+55 11 99999-9999"
                aria-describedby="whatsapp-status"
              >
            </label>
            <div class="share-actions">
              <button class="secondary-button" id="whatsapp-copy-button" type="button">Copiar</button>
              <button class="primary-button" type="submit">Abrir WhatsApp</button>
            </div>
          </form>
          <p class="share-status" id="whatsapp-status" role="status" aria-live="polite"></p>
        </section>

        <section class="game-list" id="game-list" aria-label="Lista de jogos"></section>

        <section class="empty-state" id="empty-state" hidden>
          <div class="empty-visual" aria-hidden="true">
            <span></span>
          </div>
          <h2>Nenhum jogo encontrado</h2>
          <p>Altere a data, campeonato ou busca.</p>
        </section>
      </main>
    </div>

    <template id="game-card-template">
      <article class="game-card">
        <div class="game-card__meta">
          <span class="competition"></span>
          <span class="status"></span>
        </div>
        <div class="match-row">
          <strong class="team home-team"></strong>
          <span class="score-time"></span>
          <strong class="team away-team"></strong>
        </div>
        <dl class="details">
          <div>
            <dt>Fase</dt>
            <dd class="stage"></dd>
          </div>
          <div>
            <dt>Local</dt>
            <dd class="venue"></dd>
          </div>
          <div>
            <dt>Onde assistir</dt>
            <dd class="broadcasts"></dd>
          </div>
        </dl>
      </article>
    </template>

    <script src="js/app.js" defer></script>
  </body>
</html>
